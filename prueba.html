<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Public House · Instagram</title>
    
    <style>
        .global-styles, .eapps-widget-toolbar {
  display: none !important;
}
        /* ---------- VARIABLES ---------- */
        :root {
            --bg: #f5f5f5;
            --bg-card: #ffffff;
            --text-dark: #0a0a0a;
            --text-muted: #666666;
            --primary: #005082;
            --border: #e8e8e8;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 12px 48px rgba(0, 80, 130, 0.10);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text-dark);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---------- SCROLLBAR ---------- */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 99px;
        }

        /* ---------- CONTENEDOR PRINCIPAL ---------- */
        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* ============================================
               HEADER
            ============================================ */
        .header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeUp 0.7s ease 0.1s both;
        }

        .header .pretitle {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 6px;
            opacity: 0.6;
        }

        .header h1 {
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .header h1 .black {
            color: var(--text-dark);
        }

        .header h1 .blue {
            color: var(--primary);
            position: relative;
        }

        .header h1 .blue::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
            opacity: 0.15;
            border-radius: 99px;
        }

        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        .header .subtitle span {
            color: var(--primary);
            font-weight: 500;
        }

        /* ---------- DIVISOR DECORATIVO ---------- */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }

        .divider .line {
            width: 30px;
            height: 2px;
            background: var(--border);
            border-radius: 99px;
        }

        .divider .line.blue {
            width: 45px;
            background: var(--primary);
            opacity: 0.3;
        }

        .divider .diamond {
            width: 5px;
            height: 5px;
            background: var(--primary);
            transform: rotate(45deg);
            opacity: 0.4;
        }

        /* ============================================
               WIDGET WRAPPER — SIN BORDER RADIUS
            ============================================ */
        .widget-wrapper {
            position: relative;
            overflow: hidden;
            background: var(--bg-card);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all var(--transition);
            animation: fadeUp 0.7s ease 0.3s both;
            padding: 6px;
        }

        .widget-wrapper:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-3px);
        }

        .widget-wrapper .elfsight-app-40fc5d95-d614-4c4a-9ac9-80e2c43c3881 {
            position: relative;
            z-index: 0;
            min-height: 500px;
        }

        /* ============================================
               HANDLE BAR — MÁS BONITO
            ============================================ */
        .handle-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 28px;
            animation: fadeUp 0.7s ease 0.5s both;
        }

        .handle-bar a {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 12px 32px 12px 24px;
            border-radius: 999px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-dark);
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            position: relative;
        }

        .handle-bar a:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px) scale(1.02);
        }

        /* --- PUNTO VERDE DE CONECTADO --- */
        .handle-bar a .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2), 0 0 12px rgba(34, 197, 94, 0.3);
            flex-shrink: 0;
            animation: pulse-green 2s ease-in-out infinite;
            position: relative;
        }

        .handle-bar a .status-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.15);
            animation: ripple 2s ease-in-out infinite;
        }

        /* --- NOMBRE DE USUARIO --- */
        .handle-bar a .username {
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: -0.3px;
        }

        .handle-bar a .username span {
            color: var(--primary);
        }

        /* --- SEPARADOR --- */
        .handle-bar a .sep {
            color: var(--border);
            font-weight: 300;
        }

        /* --- SEGUIDORES --- */
        .handle-bar a .followers {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.85rem;
        }

        .handle-bar a .followers strong {
            color: var(--text-dark);
            font-weight: 600;
        }

        /* --- FLECHA --- */
        .handle-bar a .arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 0.8rem;
            transition: all var(--transition);
            margin-left: 4px;
            flex-shrink: 0;
        }

        .handle-bar a:hover .arrow {
            transform: translateX(4px) rotate(-45deg);
            background: #003d63;
        }

        /* ============================================
               FOOTER
            ============================================ */
        .footer {
            text-align: center;
            margin-top: 28px;
            animation: fadeUp 0.7s ease 0.6s both;
        }

        .footer p {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.4;
        }

        /* ============================================
               ANIMACIONES
            ============================================ */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-green {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(0.9);
            }
        }

        @keyframes ripple {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        /* ============================================
               RESPONSIVE
            ============================================ */
        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: clamp(1.5rem, 5vw, 2.2rem);
            }

            .header .subtitle {
                font-size: 0.8rem;
            }

            .widget-wrapper .elfsight-app-40fc5d95-d614-4c4a-9ac9-80e2c43c3881 {
                min-height: 400px;
            }

            .handle-bar a {
                padding: 10px 20px 10px 18px;
                font-size: 0.85rem;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .handle-bar a .followers {
                font-size: 0.75rem;
            }

            .handle-bar a .arrow {
                width: 24px;
                height: 24px;
                font-size: 0.7rem;
            }

            .divider .line {
                width: 20px;
            }
            .divider .line.blue {
                width: 30px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .header .pretitle {
                font-size: 0.55rem;
                letter-spacing: 2px;
            }

            .widget-wrapper {
                padding: 4px;
            }

            .widget-wrapper .elfsight-app-40fc5d95-d614-4c4a-9ac9-80e2c43c3881 {
                min-height: 350px;
            }

            .handle-bar a {
                padding: 8px 14px;
                font-size: 0.75rem;
                gap: 8px;
                border-radius: 20px;
            }

            .handle-bar a .followers {
                font-size: 0.65rem;
            }

            .handle-bar a .arrow {
                width: 20px;
                height: 20px;
                font-size: 0.6rem;
            }

            .handle-bar a .status-dot {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ==========================================
        HEADER
        ========================================== -->
        <header class="header">
            <div class="pretitle">✦ Public House</div>

            <h1>
                <span class="black">Síguenos en</span><br />
                <span class="blue">@jlmd.install</span>
            </h1>

            <p class="subtitle">
                Con amor desde el <span>otro lado del mundo</span>
            </p>

            <div class="divider">
                <span class="line"></span>
                <span class="diamond"></span>
                <span class="line blue"></span>
                <span class="diamond"></span>
                <span class="line"></span>
            </div>
        </header>

        <!-- ==========================================
        WIDGET DE INSTAGRAM — SIN BORDER RADIUS
        ========================================== -->
        <div class="widget-wrapper">
            <script src="https://elfsightcdn.com/platform.js" async></script>
            <div class="elfsight-app-40fc5d95-d614-4c4a-9ac9-80e2c43c3881" data-elfsight-app-lazy></div>
        </div>

        <!-- ==========================================
        HANDLE BAR — MÁS BONITO CON PUNTO VERDE
        ========================================== -->
        <div class="handle-bar">
            <a href="https://instagram.com/jlmd.install" target="_blank">
                <span class="status-dot"></span>
                <span class="username">@<span>jlmd.install</span></span>
                <span class="sep">·</span>
                <span class="followers"><strong>13K</strong> seguidores</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <!-- ==========================================
        FOOTER
        ========================================== -->
        <div class="footer">
            <p>Public House · Est. 2026</p>
        </div>

    </div>

    <!-- ===== JS ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🏠 Public House · Instagram Feed');
            console.log('📸 @jlmd.install · 13K seguidores');
        });

        // Detectar widget
        setTimeout(() => {
            const widget = document.querySelector('.elfsight-app-40fc5d95-d614-4c4a-9ac9-80e2c43c3881');
            if (widget && widget.children.length > 0) {
                console.log('✅ Widget de Instagram cargado');
            } else {
                console.warn('⚠️ Widget no cargado');
            }
        }, 5000);
    </script>

</body>
</html>
